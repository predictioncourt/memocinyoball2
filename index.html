<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osimhen Ball</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="room-overlay" class="overlay">
    <div class="room-panel">
      <h2>Osimhen Ball</h2>
      <div id="room-login">
        <input type="text" id="player-name" placeholder="Adını yaz..." maxlength="12">
        <button id="btn-login">Giriş Yap</button>
      </div>
      <div id="room-selection" style="display:none">
        <div class="room-actions">
          <input type="text" id="new-room-name" placeholder="Oda adı..." maxlength="12">
          <button id="btn-create">Oda Kur</button>
          <button id="btn-refresh">Yenile</button>
        </div>
        <div id="room-list">
          <p>Odalar yükleniyor...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="chat">
    <div id="chat-messages"></div>
    <form id="chat-form" autocomplete="off">
      <input id="chat-input" type="text" placeholder="Mesaj yaz..." />
      <button id="chat-send" type="submit">Gonder</button>
    </form>
  </div>
  <div id="controls">
    <div class="controls-title">Tus Ayarlari</div>
    <div class="controls-row">
      <span>Yerden sut/pas</span>
      <button id="bind-ground" type="button">Space</button>
    </div>
    <div class="controls-row">
      <span>Havadan pas</span>
      <button id="bind-air" type="button">B</button>
    </div>
    <div class="controls-row">
      <span>Karakter skill/ozellik</span>
      <button id="bind-skill" type="button">C</button>
    </div>
    <div id="controls-hint">Degistirmek icin butona bas</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
